name: "Prisma Cloud Container Scan"
description: "Scan Docker container images using Prisma Cloud twistcli for vulnerabilities and compliance issues"
author: "Solace"

inputs:
  image_registry:
    description: "Docker image registry (e.g., 868978040651.dkr.ecr.us-east-1.amazonaws.com)"
    required: true
  image_repo:
    description: "Docker image repository name (defaults to GitHub repository name if not provided)"
    required: false
    default: ""
  image_tag:
    description: "Docker image tag to scan"
    required: true
  pcc_console_url:
    description: "Prisma Cloud Console URL (e.g., https://console.prisma.cloud)"
    required: true
  pcc_user:
    description: "Prisma Cloud Access Key ID"
    required: true
  pcc_pass:
    description: "Prisma Cloud Secret Access Key"
    required: true
  twistcli_publish:
    description: "Whether to publish scan results to Prisma Cloud Console"
    required: false
    default: "true"
  block_on_compliance:
    description: "Block release on compliance issues (high/critical)"
    required: false
    default: "false"
  vulnerability_grace_period_days:
    description: "Grace period in days for new vulnerabilities before blocking (0 to block immediately)"
    required: false
    default: "7"
  skip_image_pull:
    description: "Skip pulling the image (use when image is already available locally)"
    required: false
    default: "false"
  show_detailed_logs:
    description: "Force detailed scan output in workflow logs (`true`/`false`). Defaults to `false` for public repos and `true` otherwise."
    required: false
    default: ""
  guardian_url:
    description: "Optional Guardian API base URL. When set with `guardian_key`, the action uploads normalized Prisma results to Guardian."
    required: false
    default: ""
  guardian_key:
    description: "Optional Guardian API bearer token. When set with `guardian_url`, the action uploads normalized Prisma results to Guardian."
    required: false
    default: ""
  guardian_product_name:
    description: "Optional Guardian product name. Defaults to the resolved image repository name."
    required: false
    default: ""
  guardian_product_version:
    description: "Optional Guardian product version path segment. Required when Guardian upload is enabled."
    required: false
    default: ""
  guardian_product_full_version:
    description: "Optional Guardian product full version path segment. Required when Guardian upload is enabled."
    required: false
    default: ""
  guardian_scan_time:
    description: "Optional Guardian scan timestamp in UTC ISO-8601 format. Defaults to the current UTC time."
    required: false
    default: ""

outputs:
  scan_passed:
    description: "Whether the scan passed without blocking issues (true/false)"
    value: ${{ steps.check_results.outputs.scan_passed }}
  vuln_critical:
    description: "Number of critical vulnerabilities found"
    value: ${{ steps.check_results.outputs.vuln_critical }}
  vuln_high:
    description: "Number of high severity vulnerabilities found"
    value: ${{ steps.check_results.outputs.vuln_high }}
  vuln_medium:
    description: "Number of medium severity vulnerabilities found"
    value: ${{ steps.check_results.outputs.vuln_medium }}
  vuln_low:
    description: "Number of low severity vulnerabilities found"
    value: ${{ steps.check_results.outputs.vuln_low }}
  console_link:
    description: "Deep link to Prisma Cloud Console scan results when available"
    value: ${{ steps.scan_image.outputs.console_link }}
  guardian_upload_status:
    description: "Guardian upload status: `success`, `failure`, or `skipped`."
    value: ${{ steps.guardian_result.outputs.guardian_upload_status }}
  guardian_s3_bucket:
    description: "Guardian archive bucket returned by the upload API when upload succeeds."
    value: ${{ steps.guardian_result.outputs.guardian_s3_bucket }}
  guardian_s3_path:
    description: "Guardian archive path returned by the upload API when upload succeeds."
    value: ${{ steps.guardian_result.outputs.guardian_s3_path }}

runs:
  using: "composite"
  steps:
    - name: Set Image Repository Name
      id: set_repo_name
      shell: bash
      run: |
        if [ -z "${{ inputs.image_repo }}" ]; then
          # Use GitHub repository name if image_repo is not provided
          REPO_NAME="${{ github.event.repository.name }}"
        else
          REPO_NAME="${{ inputs.image_repo }}"
        fi
        echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
        echo "Using image repository: $REPO_NAME"

    - name: Download twistcli
      id: download_twistcli
      shell: bash
      run: |
        echo "📥 Downloading twistcli from Prisma Cloud Console..."

        ARCH="$(uname -m)"
        CONSOLE_VERSION_RAW=$(curl -k -u "${{ inputs.pcc_user }}:${{ inputs.pcc_pass }}" \
          --fail --silent --show-error \
          "${{ inputs.pcc_console_url }}/api/v1/version" 2>/dev/null || true)
        API_VERSION=$(echo "$CONSOLE_VERSION_RAW" | awk 'match($0, /[0-9]+\.[0-9]+/){print substr($0, RSTART, RLENGTH); exit}')

        declare -a TWISTCLI_ENDPOINTS
        add_endpoint() {
          local candidate="$1"
          for existing in "${TWISTCLI_ENDPOINTS[@]}"; do
            if [ "$existing" = "$candidate" ]; then
              return 0
            fi
          done
          TWISTCLI_ENDPOINTS+=("$candidate")
        }

        if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
          add_endpoint "/api/v1/util/arm64/twistcli"
          if [ -n "$API_VERSION" ]; then
            add_endpoint "/api/v${API_VERSION}/util/arm64/twistcli"
          fi
          add_endpoint "/api/v1/util/twistcli"
          if [ -n "$API_VERSION" ]; then
            add_endpoint "/api/v${API_VERSION}/util/twistcli"
          fi
        else
          add_endpoint "/api/v1/util/twistcli"
          if [ -n "$API_VERSION" ]; then
            add_endpoint "/api/v${API_VERSION}/util/twistcli"
          fi
        fi

        DOWNLOAD_SUCCESS=0
        for ENDPOINT in "${TWISTCLI_ENDPOINTS[@]}"; do
          echo "Trying endpoint: $ENDPOINT"
          if curl -k -u "${{ inputs.pcc_user }}:${{ inputs.pcc_pass }}" \
            --fail --location --silent --show-error \
            --output ./twistcli \
            "${{ inputs.pcc_console_url }}${ENDPOINT}"; then
            chmod +x ./twistcli
            if ./twistcli --version > /dev/null 2>&1 || ./twistcli > /dev/null 2>&1; then
              DOWNLOAD_SUCCESS=1
              echo "download_endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
              break
            fi
            echo "Downloaded file from $ENDPOINT is not runnable on architecture $ARCH"
          fi
        done

        if [ "$DOWNLOAD_SUCCESS" -ne 1 ]; then
          echo "❌ Failed to download a runnable twistcli binary"
          echo "Runner architecture: $ARCH"
          echo "Tried endpoints: ${TWISTCLI_ENDPOINTS[*]}"
          exit 1
        fi

        # Verify twistcli version
        TWISTCLI_VERSION=$(
          ./twistcli --version 2>/dev/null | tr -d '[:space:]' || \
          ./twistcli 2>/dev/null | sed -n '2p' | tr -d '[:space:]' || \
          echo "unknown"
        )
        echo "✅ Downloaded twistcli version: $TWISTCLI_VERSION"

    - name: Pull Docker Image
      id: pull_image
      if: ${{ inputs.skip_image_pull != 'true' }}
      shell: bash
      run: |
        IMAGE_NAME="${{ inputs.image_registry }}/${{ steps.set_repo_name.outputs.repo_name }}:${{ inputs.image_tag }}"
        echo "🐳 Pulling image: $IMAGE_NAME"

        if docker pull "$IMAGE_NAME"; then
          echo "✅ Successfully pulled image: $IMAGE_NAME"
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
        else
          echo "❌ Failed to pull image: $IMAGE_NAME"
          echo ""
          echo "⚠️  If the image is in a private registry, you may need to login first."
          echo "Add a step before calling this action to authenticate with your registry:"
          echo ""
          echo "For AWS ECR:"
          echo "  - name: Configure AWS credentials"
          echo "    uses: aws-actions/configure-aws-credentials@v4"
          echo "    with:"
          echo "      aws-access-key-id: <AWS_ACCESS_KEY_ID_SECRET>"
          echo "      aws-secret-access-key: <AWS_SECRET_ACCESS_KEY_SECRET>"
          echo "      aws-region: us-east-1"
          echo ""
          echo "  - name: Login to Amazon ECR"
          echo "    uses: aws-actions/amazon-ecr-login@v2"
          echo ""
          echo "For Docker Hub:"
          echo "  - name: Login to Docker Hub"
          echo "    uses: docker/login-action@v3"
          echo "    with:"
          echo "      username: <DOCKERHUB_USERNAME_SECRET>"
          echo "      password: <DOCKERHUB_TOKEN_SECRET>"
          echo ""
          echo "For other registries:"
          echo "  - name: Login to Registry"
          echo "    run: echo \"<REGISTRY_PASSWORD_SECRET>\" | docker login <registry> -u \"<REGISTRY_USERNAME_SECRET>\" --password-stdin"
          exit 1
        fi

    - name: Use Local Docker Image
      id: local_image
      if: ${{ inputs.skip_image_pull == 'true' }}
      shell: bash
      run: |
        IMAGE_NAME="${{ inputs.image_registry }}/${{ steps.set_repo_name.outputs.repo_name }}:${{ inputs.image_tag }}"
        echo "🐳 Using local image: $IMAGE_NAME"

        # Verify image exists locally
        if docker image inspect "$IMAGE_NAME" > /dev/null 2>&1; then
          echo "✅ Found local image: $IMAGE_NAME"
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
        else
          echo "❌ Local image not found: $IMAGE_NAME"
          echo ""
          echo "Available local images:"
          docker images
          exit 1
        fi

    - name: Scan Image with twistcli
      id: scan_image
      shell: bash
      run: |
        IMAGE_NAME="${{ steps.pull_image.outputs.image_name || steps.local_image.outputs.image_name }}"
        echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
        echo "🔍 Scanning image with Prisma Cloud twistcli..."

        # Determine publish flag
        if [ "${{ inputs.twistcli_publish }}" = "true" ]; then
          PUBLISH_FLAG="--publish"
        else
          PUBLISH_FLAG=""
        fi

        REPO_VISIBILITY="${{ github.event.repository.visibility }}"
        if [ -z "$REPO_VISIBILITY" ]; then
          REPO_VISIBILITY="private"
        fi

        SHOW_DETAILED_LOGS="${{ inputs.show_detailed_logs }}"
        if [ -z "$SHOW_DETAILED_LOGS" ]; then
          if [ "$REPO_VISIBILITY" = "public" ]; then
            SHOW_DETAILED_LOGS="false"
          else
            SHOW_DETAILED_LOGS="true"
          fi
        fi
        SHOW_DETAILED_LOGS=$(echo "$SHOW_DETAILED_LOGS" | tr '[:upper:]' '[:lower:]')
        echo "repo_visibility=$REPO_VISIBILITY" >> $GITHUB_OUTPUT
        echo "show_detailed_logs=$SHOW_DETAILED_LOGS" >> $GITHUB_OUTPUT

        # Resolve commit SHA for dedicated check run targeting.
        # Prefer PR head SHA when available, then checked-out HEAD, then github.sha.
        TARGET_SHA="${{ github.event.pull_request.head.sha }}"
        if [ -z "$TARGET_SHA" ]; then
          TARGET_SHA=$(git rev-parse HEAD 2>/dev/null || true)
        fi
        if [ -z "$TARGET_SHA" ]; then
          TARGET_SHA="${{ github.sha }}"
        fi
        echo "target_sha=$TARGET_SHA" >> $GITHUB_OUTPUT

        if [ "$SHOW_DETAILED_LOGS" = "true" ]; then
          DETAILS_FLAG="--details"
          echo "Detailed scan output is enabled in workflow logs."
        else
          DETAILS_FLAG=""
          echo "Detailed scan output is hidden for visibility=$REPO_VISIBILITY."
        fi

        # Run twistcli scan and capture output
        set +e
        if [ "$SHOW_DETAILED_LOGS" = "true" ]; then
          ./twistcli images scan \
            --address "${{ inputs.pcc_console_url }}" \
            --user "${{ inputs.pcc_user }}" \
            --password "${{ inputs.pcc_pass }}" \
            --output-file pcc_scan_results.json \
            $DETAILS_FLAG \
            $PUBLISH_FLAG \
            "$IMAGE_NAME" 2>&1 | tee pcc_scan_output.txt
          SCAN_EXIT_CODE=${PIPESTATUS[0]}
        else
          ./twistcli images scan \
            --address "${{ inputs.pcc_console_url }}" \
            --user "${{ inputs.pcc_user }}" \
            --password "${{ inputs.pcc_pass }}" \
            --output-file pcc_scan_results.json \
            $DETAILS_FLAG \
            $PUBLISH_FLAG \
            "$IMAGE_NAME" > pcc_scan_output.txt 2>&1
          SCAN_EXIT_CODE=$?
        fi
        set -e
        echo "scan_exit_code=$SCAN_EXIT_CODE" >> $GITHUB_OUTPUT

        # Check if scan results file was created
        if [ ! -f "pcc_scan_results.json" ]; then
          echo "❌ Scan results file not found. Scan may have failed."
          exit 1
        fi

        # Extract console link from JSON first, then fallback to scan logs
        CONSOLE_LINK=$(jq -r '.consoleURL // empty' pcc_scan_results.json 2>/dev/null || true)
        if [ -z "$CONSOLE_LINK" ] && [ -f "pcc_scan_output.txt" ]; then
          CONSOLE_LINK=$(sed -n 's/.*Link to the results in Console:[[:space:]]*//p' pcc_scan_output.txt | awk 'NF{last=$0} END{print last}')
        fi
        if [ -n "$CONSOLE_LINK" ]; then
          echo "console_link=$CONSOLE_LINK" >> $GITHUB_OUTPUT
          echo "📊 View detailed results: $CONSOLE_LINK"
        else
          echo "⚠️ Could not extract Prisma Cloud console link from scan results"
        fi

        if [ "$SCAN_EXIT_CODE" -ne 0 ]; then
          echo "⚠️ twistcli exited with code $SCAN_EXIT_CODE. This can indicate policy violations or scan errors."
        fi

        if [ "$SHOW_DETAILED_LOGS" != "true" ]; then
          echo "Detailed vulnerability/compliance findings are hidden in logs."
          echo "Use the Prisma Console link and uploaded artifact for full details."
        fi

        echo "✅ Scan completed"

    - name: Prepare Guardian Prisma payload
      id: guardian_payload
      if: always()
      shell: bash
      run: |
        if [ ! -f "pcc_scan_results.json" ]; then
          echo "file=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        jq '. = [.results[0]]' "pcc_scan_results.json" > "prisma_scan.json"
        echo "file=prisma_scan.json" >> "$GITHUB_OUTPUT"

    - name: Check Scan Results and Block on Issues
      id: check_results
      shell: bash
      env:
        BLOCK_ON_COMPLIANCE: ${{ inputs.block_on_compliance }}
        GRACE_PERIOD_DAYS: ${{ inputs.vulnerability_grace_period_days }}
        CONSOLE_LINK: ${{ steps.scan_image.outputs.console_link }}
        PCC_CONSOLE_URL: ${{ inputs.pcc_console_url }}
      run: |
        python3 "${{ github.action_path }}/scripts/analyze_scan_results.py"

    - name: Post Prisma Check Run
      id: post_status
      if: always()
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SCAN_EXIT_CODE: ${{ steps.scan_image.outputs.scan_exit_code }}
        IMAGE_NAME: ${{ steps.scan_image.outputs.image_name }}
        REPO_VISIBILITY: ${{ steps.scan_image.outputs.repo_visibility }}
        SHOW_DETAILED_LOGS: ${{ steps.scan_image.outputs.show_detailed_logs }}
        TARGET_SHA: ${{ steps.scan_image.outputs.target_sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        CONSOLE_LINK: ${{ steps.scan_image.outputs.console_link }}
        PCC_CONSOLE_URL: ${{ inputs.pcc_console_url }}
        FALLBACK_IMAGE: ${{ inputs.image_registry }}/${{ steps.set_repo_name.outputs.repo_name }}:${{ inputs.image_tag }}
      run: |
        python3 "${{ github.action_path }}/scripts/post_prisma_check_run.py"

    - name: Prepare Scan Artifact Name
      id: artifact_name
      if: always()
      shell: bash
      run: |
        RAW_TAG="${{ inputs.image_tag }}"
        SAFE_TAG=$(echo "$RAW_TAG" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-' )
        if [ -z "$SAFE_TAG" ]; then
          SAFE_TAG="scan"
        fi
        echo "name=prisma-cloud-scan-results-${{ runner.os }}-${{ runner.arch }}-${SAFE_TAG}" >> $GITHUB_OUTPUT

    - name: Upload Scan Results
      id: upload_artifacts
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ steps.artifact_name.outputs.name }}
        path: |
          pcc_scan_results.json
          prisma_scan.json
          pcc_scan_output.txt
          pcc_scan_analysis.json
        retention-days: 30
        if-no-files-found: warn

    - name: Resolve Guardian upload configuration
      id: guardian_config
      if: always()
      shell: bash
      env:
        INPUT_GUARDIAN_URL: ${{ inputs.guardian_url }}
        INPUT_GUARDIAN_KEY: ${{ inputs.guardian_key }}
        INPUT_GUARDIAN_PRODUCT_NAME: ${{ inputs.guardian_product_name }}
        INPUT_GUARDIAN_PRODUCT_VERSION: ${{ inputs.guardian_product_version }}
        INPUT_GUARDIAN_PRODUCT_FULL_VERSION: ${{ inputs.guardian_product_full_version }}
        INPUT_GUARDIAN_SCAN_TIME: ${{ inputs.guardian_scan_time }}
        DEFAULT_PRODUCT_NAME: ${{ steps.set_repo_name.outputs.repo_name }}
      run: |
        set -euo pipefail

        REQUESTED=false
        for value in \
          "$INPUT_GUARDIAN_URL" \
          "$INPUT_GUARDIAN_KEY" \
          "$INPUT_GUARDIAN_PRODUCT_NAME" \
          "$INPUT_GUARDIAN_PRODUCT_VERSION" \
          "$INPUT_GUARDIAN_PRODUCT_FULL_VERSION" \
          "$INPUT_GUARDIAN_SCAN_TIME"; do
          if [ -n "$value" ]; then
            REQUESTED=true
            break
          fi
        done

        if [ "$REQUESTED" != "true" ]; then
          echo "requested=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        PRODUCT_NAME="$INPUT_GUARDIAN_PRODUCT_NAME"
        if [ -z "$PRODUCT_NAME" ]; then
          PRODUCT_NAME="$DEFAULT_PRODUCT_NAME"
        fi

        SCAN_TIME="$INPUT_GUARDIAN_SCAN_TIME"
        if [ -z "$SCAN_TIME" ]; then
          SCAN_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
        fi

        MISSING=()
        [ -z "$INPUT_GUARDIAN_URL" ] && MISSING+=("guardian_url")
        [ -z "$INPUT_GUARDIAN_KEY" ] && MISSING+=("guardian_key")
        [ -z "$PRODUCT_NAME" ] && MISSING+=("guardian_product_name")
        [ -z "$INPUT_GUARDIAN_PRODUCT_VERSION" ] && MISSING+=("guardian_product_version")
        [ -z "$INPUT_GUARDIAN_PRODUCT_FULL_VERSION" ] && MISSING+=("guardian_product_full_version")

        if [ "${#MISSING[@]}" -gt 0 ]; then
          echo "Guardian upload was requested but required inputs are missing: ${MISSING[*]}" >&2
          exit 1
        fi

        echo "::add-mask::$INPUT_GUARDIAN_KEY"
        echo "requested=true" >> "$GITHUB_OUTPUT"
        echo "guardian_url=$INPUT_GUARDIAN_URL" >> "$GITHUB_OUTPUT"
        echo "guardian_key=$INPUT_GUARDIAN_KEY" >> "$GITHUB_OUTPUT"
        echo "product_name=$PRODUCT_NAME" >> "$GITHUB_OUTPUT"
        echo "product_version=$INPUT_GUARDIAN_PRODUCT_VERSION" >> "$GITHUB_OUTPUT"
        echo "product_full_version=$INPUT_GUARDIAN_PRODUCT_FULL_VERSION" >> "$GITHUB_OUTPUT"
        echo "scan_time=$SCAN_TIME" >> "$GITHUB_OUTPUT"

    - name: Upload Prisma results to Guardian
      id: guardian_upload
      if: always() && steps.guardian_config.outputs.requested == 'true'
      continue-on-error: true
      shell: bash
      env:
        PRISMA_SCAN_URL: ${{ steps.scan_image.outputs.console_link }}
      run: |
        bash "${{ github.action_path }}/scripts/upload_guardian_scan_results.sh" \
          --guardian-url "${{ steps.guardian_config.outputs.guardian_url }}" \
          --guardian-key "${{ steps.guardian_config.outputs.guardian_key }}" \
          --product-name "${{ steps.guardian_config.outputs.product_name }}" \
          --product-version "${{ steps.guardian_config.outputs.product_version }}" \
          --product-full-version "${{ steps.guardian_config.outputs.product_full_version }}" \
          --scan-time "${{ steps.guardian_config.outputs.scan_time }}" \
          --prisma-file "${{ steps.guardian_payload.outputs.file }}" \
          --prisma-scan-url "${PRISMA_SCAN_URL}"

    - name: Finalize Guardian upload outputs
      id: guardian_result
      if: always()
      shell: bash
      run: |
        STATUS="skipped"
        if [ "${{ steps.guardian_config.outputs.requested }}" = "true" ]; then
          if [ "${{ steps.guardian_upload.outcome }}" = "success" ]; then
            STATUS="success"
          else
            STATUS="failure"
          fi
        fi

        echo "guardian_upload_status=$STATUS" >> "$GITHUB_OUTPUT"
        echo "guardian_s3_bucket=${{ steps.guardian_upload.outputs.s3_bucket }}" >> "$GITHUB_OUTPUT"
        echo "guardian_s3_path=${{ steps.guardian_upload.outputs.s3_path }}" >> "$GITHUB_OUTPUT"

    - name: Enforce Guardian upload result
      if: always() && steps.guardian_config.outputs.requested == 'true' && steps.guardian_result.outputs.guardian_upload_status != 'success'
      shell: bash
      run: |
        echo "Guardian upload failed." >&2
        exit 1
