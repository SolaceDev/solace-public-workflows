name: Release Security Checks

on:
  workflow_call:
    inputs:
      git_ref:
        type: string
        required: false
        default: ""
        description: "Git ref (SHA/tag/branch) to checkout and evaluate"
      prisma_check:
        type: boolean
        required: false
        default: false
        description: "Run Prisma check"
      sonarqube_hotspot_check:
        type: boolean
        required: false
        default: false
        description: "Run SonarQube Hotspot Check"
      fossa_check:
        type: boolean
        required: false
        default: false
        description: "Run FOSSA Check"
    outputs:
      git_ref_used:
        description: "Git ref used by this security check run"
        value: ${{ jobs.security-checks.outputs.git_ref_used }}
      fossa_licensing_result:
        description: "Result of FOSSA licensing step"
        value: ${{ jobs.security-checks.outputs.fossa_licensing_result }}
      fossa_vulnerability_result:
        description: "Result of FOSSA vulnerability step"
        value: ${{ jobs.security-checks.outputs.fossa_vulnerability_result }}
      prisma_result:
        description: "Result of Prisma check step"
        value: ${{ jobs.security-checks.outputs.prisma_result }}
      sonarqube_hotspot_result:
        description: "Result of SonarQube hotspot step"
        value: ${{ jobs.security-checks.outputs.sonarqube_hotspot_result }}
    secrets:
      MANIFEST_AWS_REGION:
        description: "AWS region for the manifest"
        required: false
      MANIFEST_AWS_ACCESS_KEY_ID:
        description: "AWS access key ID for the manifest"
        required: false
      MANIFEST_AWS_SECRET_ACCESS_KEY:
        description: "AWS secret access key for the manifest"
        required: false
      PRISMA_DOCKER_IMAGE_TO_CHECK:
        description: "Prisma docker image to check"
        required: false
      PRISMA_ACCESS_KEY:
        description: "Prisma access key ID"
        required: false
      PRISMA_ACCESS_KEY_SECRET:
        description: "Prisma secret access key"
        required: false
      SONARQUBE_PROJECT_KEY:
        description: "SonarQube project key"
        required: false
      SONARQUBE_PROJECT_MAIN_BRANCH:
        description: "SonarQube project main branch"
        required: false
      SONARQUBE_QUERY_TOKEN:
        description: "SonarQube query token"
        required: false
      SONARQUBE_HOTSPOTS_API_URL:
        description: "SonarQube hotspots API URL"
        required: false
      FOSSA_API_KEY:
        description: "Fossa API key"
        required: false

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  security-checks:
    name: Security Checks
    timeout-minutes: 15
    runs-on: ubuntu-latest
    outputs:
      git_ref_used: ${{ steps.resolve-ref.outputs.git_ref_used }}
      fossa_licensing_result: ${{ steps.fossa_licensing.outcome }}
      fossa_vulnerability_result: ${{ steps.fossa_vulnerability.outcome }}
      prisma_result: ${{ steps.prisma.outcome }}
      sonarqube_hotspot_result: ${{ steps.sonarqube_hotspots.outcome }}
    steps:
      - name: Resolve git ref
        id: resolve-ref
        run: |
          RESOLVED_REF="${{ inputs.git_ref }}"
          if [[ -z "${RESOLVED_REF}" ]]; then
            RESOLVED_REF="${{ github.sha }}"
          fi
          echo "git_ref_used=${RESOLVED_REF}" >> "$GITHUB_OUTPUT"
          echo "Using git ref: ${RESOLVED_REF}"

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve-ref.outputs.git_ref_used }}

      - name: FOSSA Guard - Block on Policy Violations
        id: fossa_licensing
        uses: SolaceDev/solace-public-workflows/.github/actions/fossa-guard@main
        if: ${{ fromJson(inputs.fossa_check) }}
        continue-on-error: true
        with:
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          fossa_project_id: "${{ github.repository_owner }}_${{ github.event.repository.name }}"
          fossa_branch: ${{ github.event.repository.default_branch }}
          fossa_revision: ${{ steps.resolve-ref.outputs.git_ref_used }}
          fossa_category: licensing
          fossa_mode: BLOCK
          block_on: policy_conflict

      - name: FOSSA Guard - Block on Security Vulnerabilities
        id: fossa_vulnerability
        uses: SolaceDev/solace-public-workflows/.github/actions/fossa-guard@main
        if: ${{ fromJson(inputs.fossa_check) }}
        continue-on-error: true
        with:
          fossa_api_key: ${{ secrets.FOSSA_API_KEY }}
          fossa_project_id: "${{ github.repository_owner }}_${{ github.event.repository.name }}"
          fossa_branch: ${{ github.event.repository.default_branch }}
          fossa_revision: ${{ steps.resolve-ref.outputs.git_ref_used }}
          fossa_category: vulnerability
          fossa_mode: BLOCK
          block_on: critical,high

      - name: Run Prisma Check
        id: prisma
        if: ${{ fromJson(inputs.prisma_check) }}
        uses: docker://ghcr.io/solacedev/maas-build-actions:latest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MANIFEST_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MANIFEST_AWS_SECRET_ACCESS_KEY }}
          PRISMA_REPOSITORY_NAME: ${{ github.event.repository.name }}
          DOCKER_IMAGE_TO_CHECK: ${{ secrets.PRISMA_DOCKER_IMAGE_TO_CHECK }}
          PRISMA_ACCESS_KEY_ID: ${{ secrets.PRISMA_ACCESS_KEY }}
          PRISMA_ACCESS_KEY_SECRET: ${{ secrets.PRISMA_ACCESS_KEY_SECRET }}
          PRISMA_JIRA_CHECK: "True"
          AWS_REGION: ${{ secrets.MANIFEST_AWS_REGION }}
          JIRA_ONLY: "True"
          STATUS_CHECK: "True"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ORG: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
          GITHUB_SHA: ${{ steps.resolve-ref.outputs.git_ref_used }}
        with:
          entrypoint: /bin/sh
          args: >
            -c ". $VIRTUAL_ENV/bin/activate &&
            cd $ACTIONS_PATH/prisma-vulnerability-checker &&
            python prisma_vulnerability_checker.py
            "

      - name: Run SonarQube Hotspot Check
        id: sonarqube_hotspots
        uses: docker://ghcr.io/solacedev/maas-build-actions:latest
        if: ${{ fromJson(inputs.sonarqube_hotspot_check) }}
        env:
          SONARQUBE_PROJECT_KEY: ${{ secrets.SONARQUBE_PROJECT_KEY }}
          SONARQUBE_PROJECT_MAIN_BRANCH: ${{ secrets.SONARQUBE_PROJECT_MAIN_BRANCH }}
          SONARQUBE_QUERY_TOKEN: ${{ secrets.SONARQUBE_QUERY_TOKEN }}
          SONARQUBE_HOTSPOTS_API_URL: ${{ secrets.SONARQUBE_HOTSPOTS_API_URL }}
        with:
          entrypoint: /bin/sh
          args: >
            -c ". $VIRTUAL_ENV/bin/activate &&
            cd $ACTIONS_PATH/sonarqube-hotspot-checker &&
            python sonarqube_checker.py
            "
