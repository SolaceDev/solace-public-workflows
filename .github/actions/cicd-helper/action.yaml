name: RC Helper
description: Reusable action for RC helper Slack notifications via Docker container.
inputs:
  rc_step:
    description: RC step (e.g., post_to_thread, update_message_header)
    required: true
  message_header:
    description: Slack message header (for post_to_channel)
    required: false
  repo_name:
    description: GitHub repository name (e.g., owner/repo)
    required: false
  slack_token:
    description: Slack API token (should be passed as a secret)
    required: false
  slack_channel:
    description: Slack channel ID (e.g., G015384QZAB)
    required: false
  thread_ts:
    description: Slack thread timestamp (for thread updates)
    required: false
  message:
    description: Slack message content (for post_to_channel)
    required: false
  thread_message:
    description: Slack thread message content (for post_to_thread)
    required: false
  new_message_header:
    description: Slack message header (for update_message_header step)
    required: false
  change_log_header_metadata:
    description: Change log header metadata (for update_message_header step)
    required: false
  previous_message:
    description: Previous Slack message (for update_message_header step)
    required: false
  thread_message_ts:
    description: thread reply timestamp
    required: false
  new_thread_message:
    description: new message that needs to be updates in thread reply
    required: false
  deployed_ref:
    description: Deployed reference SHA or tag (for changelog message, e.g., previous deployment, base branch, or environment)
    required: false
  candidate_ref:
    description: Candidate reference SHA or tag (for changelog message, e.g., new deployment, PR head, or target commit)
    required: false
  contributors_raw_list:
    description: Contributors list
    required: false
  ddb_item_to_be_added:
    description: JSON string of the item (for add_item_from_json_to_dynamodb_table)
    required: false
  ddb_table_name:
    description: DynamoDB table name (for DynamoDB steps)
    required: false
  ddb_partition_key:
    description: Partition key name (for DynamoDB steps)
    required: false
  ddb_sort_key:
    description: Sort key name (for add_item_from_json_to_dynamodb_table)
    required: false
  ddb_query_json:
    description: JSON string for the query (for item_exists_in_dynamodb)
    required: false
  ddb_exists_output:
    description: "Output variable name (default: ITEM_EXISTS) (for item_exists_in_dynamodb)"
    required: false
  ddb_field_path:
    description: "Dot-separated path to the field (e.g., dev.image_tag for a single value, dev for the whole section) (for get_item_value_from_dynamodb)"
    required: false
  ddb_output_name:
    description: "Output variable name (default: FIELD_VALUE) (for get_item_value_from_dynamodb)"
    required: false
  ddb_return_section:
    description: "If set to true, returns the entire section as clean JSON; if false or omitted, returns a single field value (for get_item_value_from_dynamodb)"
    required: false
  ddb_table_index_name:
    description: "DynamoDB table's index name"
    required: false
  ddb_index_field_name:
    description: "DynamoDB table field used for index"
    required: false
  ddb_index_field_value:
    description: "DynamoDB table, value used to match index field value"
    required: false
  aws_region:
    description: "AWS region to use (optional, defaults to us-east-1 if not set)"
    required: false

runs:
  using: composite
  steps:
    - name: Run RC Helper
      shell: bash
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

        # Authenticate to GHCR using the calling workflow's token so internal
        # org packages can be pulled. runs.using: docker did this automatically;
        # with composite + docker run we handle it explicitly.
        echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

        # Map INPUT_* vars to the names the container scripts expect, then pass
        # each to docker via -e KEY (by reference from the current process env).
        # This is the safer approach: secrets are never written to disk and never
        # appear as command-line argument values visible in the process list.
        export SLACK_TOKEN="${INPUT_SLACK_TOKEN}"
        export SLACK_CHANNEL="${INPUT_SLACK_CHANNEL}"
        export RC_STEP="${INPUT_RC_STEP}"
        export RC_PYTHON="python3"
        export RC_HELPER_SCRIPT="/maas-build-actions/scripts/cicd-helper/cicd-helper.py"
        [ -n "${INPUT_THREAD_TS}" ]               && export THREAD_TS="${INPUT_THREAD_TS}"
        [ -n "${INPUT_MESSAGE}" ]                  && export MESSAGE="${INPUT_MESSAGE}"
        [ -n "${INPUT_THREAD_MESSAGE}" ]           && export THREAD_MESSAGE="${INPUT_THREAD_MESSAGE}"
        [ -n "${INPUT_MESSAGE_HEADER}" ]           && export MESSAGE_HEADER="${INPUT_MESSAGE_HEADER}"
        [ -n "${INPUT_NEW_MESSAGE_HEADER}" ]       && export NEW_MESSAGE_HEADER="${INPUT_NEW_MESSAGE_HEADER}"
        [ -n "${INPUT_CHANGE_LOG_HEADER_METADATA}" ] && export CHANGE_LOG_HEADER_METADATA="${INPUT_CHANGE_LOG_HEADER_METADATA}"
        [ -n "${INPUT_PREVIOUS_MESSAGE}" ]         && export PREVIOUS_MESSAGE="${INPUT_PREVIOUS_MESSAGE}"
        [ -n "${INPUT_REPO_NAME}" ]                && export REPO_NAME="${INPUT_REPO_NAME}"
        [ -n "${INPUT_DEPLOYED_REF}" ]             && export DEPLOYED_REF="${INPUT_DEPLOYED_REF}"
        [ -n "${INPUT_CANDIDATE_REF}" ]            && export CANDIDATE_REF="${INPUT_CANDIDATE_REF}"
        [ -n "${INPUT_CONTRIBUTORS_RAW_LIST}" ]    && export CONTRIBUTORS_RAW_LIST="${INPUT_CONTRIBUTORS_RAW_LIST}"
        [ -n "${INPUT_DDB_ITEM_TO_BE_ADDED}" ]     && export DDB_ITEM_TO_BE_ADDED="${INPUT_DDB_ITEM_TO_BE_ADDED}"
        [ -n "${INPUT_DDB_TABLE_NAME}" ]           && export DDB_TABLE_NAME="${INPUT_DDB_TABLE_NAME}"
        [ -n "${INPUT_DDB_PARTITION_KEY}" ]        && export DDB_PARTITION_KEY="${INPUT_DDB_PARTITION_KEY}"
        [ -n "${INPUT_DDB_SORT_KEY}" ]             && export DDB_SORT_KEY="${INPUT_DDB_SORT_KEY}"
        [ -n "${INPUT_DDB_QUERY_JSON}" ]           && export DDB_QUERY_JSON="${INPUT_DDB_QUERY_JSON}"
        [ -n "${INPUT_DDB_EXISTS_OUTPUT}" ]        && export DDB_EXISTS_OUTPUT="${INPUT_DDB_EXISTS_OUTPUT}"
        [ -n "${INPUT_DDB_FIELD_PATH}" ]           && export DDB_FIELD_PATH="${INPUT_DDB_FIELD_PATH}"
        [ -n "${INPUT_DDB_OUTPUT_NAME}" ]          && export DDB_OUTPUT_NAME="${INPUT_DDB_OUTPUT_NAME}"
        [ -n "${INPUT_DDB_RETURN_SECTION}" ]       && export DDB_RETURN_SECTION="${INPUT_DDB_RETURN_SECTION}"
        [ -n "${INPUT_THREAD_MESSAGE_TS}" ]        && export THREAD_MESSAGE_TS="${INPUT_THREAD_MESSAGE_TS}"
        [ -n "${INPUT_NEW_THREAD_MESSAGE}" ]       && export NEW_THREAD_MESSAGE="${INPUT_NEW_THREAD_MESSAGE}"
        [ -n "${INPUT_DDB_TABLE_INDEX_NAME}" ]     && export DDB_TABLE_INDEX_NAME="${INPUT_DDB_TABLE_INDEX_NAME}"
        [ -n "${INPUT_DDB_INDEX_FIELD_NAME}" ]     && export DDB_INDEX_FIELD_NAME="${INPUT_DDB_INDEX_FIELD_NAME}"
        [ -n "${INPUT_DDB_INDEX_FIELD_VALUE}" ]    && export DDB_INDEX_FIELD_VALUE="${INPUT_DDB_INDEX_FIELD_VALUE}"
        export AWS_REGION="${INPUT_AWS_REGION:-us-east-1}"

        docker run --rm \
          -e SLACK_TOKEN \
          -e SLACK_CHANNEL \
          -e RC_STEP \
          -e RC_PYTHON \
          -e RC_HELPER_SCRIPT \
          -e THREAD_TS \
          -e MESSAGE \
          -e THREAD_MESSAGE \
          -e MESSAGE_HEADER \
          -e NEW_MESSAGE_HEADER \
          -e CHANGE_LOG_HEADER_METADATA \
          -e PREVIOUS_MESSAGE \
          -e REPO_NAME \
          -e DEPLOYED_REF \
          -e CANDIDATE_REF \
          -e CONTRIBUTORS_RAW_LIST \
          -e DDB_ITEM_TO_BE_ADDED \
          -e DDB_TABLE_NAME \
          -e DDB_PARTITION_KEY \
          -e DDB_SORT_KEY \
          -e DDB_QUERY_JSON \
          -e DDB_EXISTS_OUTPUT \
          -e DDB_FIELD_PATH \
          -e DDB_OUTPUT_NAME \
          -e DDB_RETURN_SECTION \
          -e THREAD_MESSAGE_TS \
          -e NEW_THREAD_MESSAGE \
          -e DDB_TABLE_INDEX_NAME \
          -e DDB_INDEX_FIELD_NAME \
          -e DDB_INDEX_FIELD_VALUE \
          -e AWS_REGION \
          -e GITHUB_REPOSITORY \
          -e GITHUB_OUTPUT \
          -e GITHUB_STEP_SUMMARY \
          -v "${GITHUB_WORKSPACE}:/github/workspace" \
          -v "${RUNNER_TEMP}:${RUNNER_TEMP}" \
          --workdir /github/workspace \
          "ghcr.io/${OWNER}/maas-build-actions:master" \
          /bin/sh -c 'source /maas-build-actions/venv/bin/activate && $RC_PYTHON $RC_HELPER_SCRIPT'

