name: RC Helper
description: Reusable action for RC helper Slack notifications via Docker container.
inputs:
  rc_step:
    description: RC step (e.g., post_to_thread, update_message_header)
    required: true
  message_header:
    description: Slack message header (for post_to_channel)
    required: false
  repo_name:
    description: GitHub repository name (e.g., owner/repo)
    required: false
  slack_token:
    description: Slack API token (should be passed as a secret)
    required: false
  slack_channel:
    description: Slack channel ID (e.g., G015384QZAB)
    required: false
  thread_ts:
    description: Slack thread timestamp (for thread updates)
    required: false
  message:
    description: Slack message content (for post_to_channel)
    required: false
  message_blocks:
    description: "JSON array of Block Kit blocks (for post_to_channel; when provided, blocks are posted directly instead of converting message text)"
    required: false
  thread_message:
    description: Slack thread message content (for post_to_thread)
    required: false
  new_message_header:
    description: Slack message header (for update_message_header step)
    required: false
  change_log_header_metadata:
    description: Change log header metadata (for update_message_header step)
    required: false
  previous_message:
    description: Previous Slack message (for update_message_header step)
    required: false
  thread_message_ts:
    description: thread reply timestamp
    required: false
  new_thread_message:
    description: new message that needs to be updates in thread reply
    required: false
  deployed_ref:
    description: Deployed reference SHA or tag (for changelog message, e.g., previous deployment, base branch, or environment)
    required: false
  candidate_ref:
    description: Candidate reference SHA or tag (for changelog message, e.g., new deployment, PR head, or target commit)
    required: false
  contributors_raw_list:
    description: Contributors list
    required: false
  ddb_item_to_be_added:
    description: JSON string of the item (for add_item_from_json_to_dynamodb_table)
    required: false
  ddb_table_name:
    description: DynamoDB table name (for DynamoDB steps)
    required: false
  ddb_partition_key:
    description: Partition key name (for DynamoDB steps)
    required: false
  ddb_sort_key:
    description: Sort key name (for add_item_from_json_to_dynamodb_table)
    required: false
  ddb_query_json:
    description: JSON string for the query (for item_exists_in_dynamodb)
    required: false
  ddb_exists_output:
    description: "Output variable name (default: ITEM_EXISTS) (for item_exists_in_dynamodb)"
    required: false
  ddb_field_path:
    description: "Dot-separated path to the field (e.g., dev.image_tag for a single value, dev for the whole section) (for get_item_value_from_dynamodb)"
    required: false
  ddb_output_name:
    description: "Output variable name (default: FIELD_VALUE) (for get_item_value_from_dynamodb)"
    required: false
  ddb_return_section:
    description: "If set to true, returns the entire section as clean JSON; if false or omitted, returns a single field value (for get_item_value_from_dynamodb)"
    required: false
  ddb_table_index_name:
    description: "DynamoDB table's index name"
    required: false
  ddb_index_field_name:
    description: "DynamoDB table field used for index"
    required: false
  ddb_index_field_value:
    description: "DynamoDB table, value used to match index field value"
    required: false
  ddb_field_value:
    description: "Value to set for the field (for update_item_field step)"
    required: false
  new_status_text:
    description: "New mrkdwn text for the status block (for update_status_block step, e.g. '> :white_check_mark: _Deployed_')"
    required: false
  header_emoji:
    description: "Emoji to replace the leading emoji in the message header (for update_status_block step, e.g. ':status-success:')"
    required: false
  aws_region:
    description: "AWS region to use (optional, defaults to us-east-1 if not set)"
    required: false

outputs:
  # Outputs from post_to_channel
  MAIN_SLACK_THREAD_TS:
    description: "Timestamp of the main Slack channel message (use as thread_ts in subsequent steps)"
    value: ${{ steps.run_rc_helper.outputs.MAIN_SLACK_THREAD_TS }}
  MAIN_SLACK_MESSAGE:
    description: "Text content of the main Slack channel message"
    value: ${{ steps.run_rc_helper.outputs.MAIN_SLACK_MESSAGE }}
  # Outputs from post_to_thread
  THREAD_MESSAGE_TS:
    description: "Timestamp of the thread reply message (use as thread_message_ts in update_thread_message steps)"
    value: ${{ steps.run_rc_helper.outputs.THREAD_MESSAGE_TS }}
  # Outputs from prepare_change_log_message
  CHANGE_LOG_MESSAGE:
    description: "Formatted changelog message for use as message input in subsequent post_to_channel/post_to_thread steps"
    value: ${{ steps.run_rc_helper.outputs.CHANGE_LOG_MESSAGE }}
  # Outputs from get_item_value_from_dynamodb
  # The key name matches whatever ddb_output_name is set to by the caller.
  # Add a new entry here for each distinct ddb_output_name value used across callers.
  RC_VERSION:
    description: "DynamoDB field value (when ddb_output_name=RC_VERSION)"
    value: ${{ steps.run_rc_helper.outputs.RC_VERSION }}
  mq_sha_metadata:
    description: "DynamoDB item JSON returned by get_item_by_index (when ddb_output_name=mq_sha_metadata)"
    value: ${{ steps.run_rc_helper.outputs.mq_sha_metadata }}
  FIELD_VALUE:
    description: "DynamoDB field value (default ddb_output_name for get_item_value_from_dynamodb)"
    value: ${{ steps.run_rc_helper.outputs.FIELD_VALUE }}
  # Outputs from item_exists_in_dynamodb
  # The key name matches whatever ddb_exists_output is set to (default: ITEM_EXISTS).
  ITEM_EXISTS:
    description: "DynamoDB item existence flag (when ddb_exists_output=ITEM_EXISTS)"
    value: ${{ steps.run_rc_helper.outputs.ITEM_EXISTS }}
  SHA_PASSED_RC:
    description: "DynamoDB item existence flag (when ddb_exists_output=SHA_PASSED_RC)"
    value: ${{ steps.run_rc_helper.outputs.SHA_PASSED_RC }}

runs:
  using: composite
  steps:
    - name: Run RC Helper
      id: run_rc_helper
      shell: bash
      env:
        # Inject all user-controlled inputs as OS environment variables so the
        # bash script never sees their values substituted inline as script text.
        # This prevents shell injection even if an input contains metacharacters.
        SLACK_TOKEN: ${{ inputs.slack_token }}
        SLACK_CHANNEL: ${{ inputs.slack_channel }}
        RC_STEP: ${{ inputs.rc_step }}
        THREAD_TS: ${{ inputs.thread_ts }}
        MESSAGE: ${{ inputs.message }}
        MESSAGE_BLOCKS: ${{ inputs.message_blocks }}
        THREAD_MESSAGE: ${{ inputs.thread_message }}
        MESSAGE_HEADER: ${{ inputs.message_header }}
        NEW_MESSAGE_HEADER: ${{ inputs.new_message_header }}
        CHANGE_LOG_HEADER_METADATA: ${{ inputs.change_log_header_metadata }}
        PREVIOUS_MESSAGE: ${{ inputs.previous_message }}
        REPO_NAME: ${{ inputs.repo_name }}
        DEPLOYED_REF: ${{ inputs.deployed_ref }}
        CANDIDATE_REF: ${{ inputs.candidate_ref }}
        CONTRIBUTORS_RAW_LIST: ${{ inputs.contributors_raw_list }}
        DDB_ITEM_TO_BE_ADDED: ${{ inputs.ddb_item_to_be_added }}
        DDB_TABLE_NAME: ${{ inputs.ddb_table_name }}
        DDB_PARTITION_KEY: ${{ inputs.ddb_partition_key }}
        DDB_SORT_KEY: ${{ inputs.ddb_sort_key }}
        DDB_QUERY_JSON: ${{ inputs.ddb_query_json }}
        DDB_EXISTS_OUTPUT: ${{ inputs.ddb_exists_output }}
        DDB_FIELD_PATH: ${{ inputs.ddb_field_path }}
        DDB_OUTPUT_NAME: ${{ inputs.ddb_output_name }}
        DDB_RETURN_SECTION: ${{ inputs.ddb_return_section }}
        THREAD_MESSAGE_TS: ${{ inputs.thread_message_ts }}
        NEW_THREAD_MESSAGE: ${{ inputs.new_thread_message }}
        DDB_TABLE_INDEX_NAME: ${{ inputs.ddb_table_index_name }}
        DDB_INDEX_FIELD_NAME: ${{ inputs.ddb_index_field_name }}
        DDB_INDEX_FIELD_VALUE: ${{ inputs.ddb_index_field_value }}
        DDB_FIELD_VALUE: ${{ inputs.ddb_field_value }}
        NEW_STATUS_TEXT: ${{ inputs.new_status_text }}
        HEADER_EMOJI: ${{ inputs.header_emoji }}
        AWS_REGION: ${{ inputs.aws_region }}
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

        # Authenticate to GHCR using the calling workflow's token so internal
        # org packages can be pulled. runs.using: docker did this automatically;
        # with composite + docker run we handle it explicitly.
        # Use an isolated DOCKER_CONFIG to avoid persisting credentials on
        # self-hosted runners' shared ~/.docker/config.json.
        DOCKER_CONFIG=$(mktemp -d "${RUNNER_TEMP}/docker-config.XXXXXX")
        export DOCKER_CONFIG
        trap 'docker logout ghcr.io > /dev/null 2>&1 || true; rm -rf "${DOCKER_CONFIG}"' EXIT
        echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

        export RC_PYTHON="python3"
        export RC_HELPER_SCRIPT="/maas-build-actions/scripts/cicd-helper/cicd-helper.py"
        export AWS_REGION="${AWS_REGION:-us-east-1}"
        # Optional inputs with Python-side defaults: unset when empty so
        # os.getenv(key, default) fallback in cicd-helper.py is preserved.
        [ -n "$DDB_EXISTS_OUTPUT" ] || unset DDB_EXISTS_OUTPUT
        [ -n "$DDB_OUTPUT_NAME" ] || unset DDB_OUTPUT_NAME
        [ -n "$DDB_RETURN_SECTION" ] || unset DDB_RETURN_SECTION

        # GITHUB_OUTPUT and GITHUB_STEP_SUMMARY live under _runner_file_commands/,
        # not under RUNNER_TEMP — mount their parent dir so the container can write outputs.
        GITHUB_OUTPUT_DIR=$(dirname "$GITHUB_OUTPUT")

        docker run --rm \
          -e SLACK_TOKEN \
          -e SLACK_CHANNEL \
          -e RC_STEP \
          -e RC_PYTHON \
          -e RC_HELPER_SCRIPT \
          -e THREAD_TS \
          -e MESSAGE \
          -e MESSAGE_BLOCKS \
          -e THREAD_MESSAGE \
          -e MESSAGE_HEADER \
          -e NEW_MESSAGE_HEADER \
          -e CHANGE_LOG_HEADER_METADATA \
          -e PREVIOUS_MESSAGE \
          -e REPO_NAME \
          -e DEPLOYED_REF \
          -e CANDIDATE_REF \
          -e CONTRIBUTORS_RAW_LIST \
          -e DDB_ITEM_TO_BE_ADDED \
          -e DDB_TABLE_NAME \
          -e DDB_PARTITION_KEY \
          -e DDB_SORT_KEY \
          -e DDB_QUERY_JSON \
          -e DDB_EXISTS_OUTPUT \
          -e DDB_FIELD_PATH \
          -e DDB_OUTPUT_NAME \
          -e DDB_RETURN_SECTION \
          -e THREAD_MESSAGE_TS \
          -e NEW_THREAD_MESSAGE \
          -e DDB_TABLE_INDEX_NAME \
          -e DDB_INDEX_FIELD_NAME \
          -e DDB_INDEX_FIELD_VALUE \
          -e DDB_FIELD_VALUE \
          -e NEW_STATUS_TEXT \
          -e HEADER_EMOJI \
          -e AWS_REGION \
          -e AWS_ACCESS_KEY_ID \
          -e AWS_SECRET_ACCESS_KEY \
          -e AWS_SESSION_TOKEN \
          -e GITHUB_TOKEN \
          -e GITHUB_REPOSITORY \
          -e GITHUB_OUTPUT \
          -e GITHUB_STEP_SUMMARY \
          -v "${GITHUB_WORKSPACE}:/github/workspace" \
          -v "${RUNNER_TEMP}:${RUNNER_TEMP}" \
          -v "${GITHUB_OUTPUT_DIR}:${GITHUB_OUTPUT_DIR}" \
          --workdir /github/workspace \
          "ghcr.io/${OWNER}/maas-build-actions@sha256:0fa634d82ee9e0311051d2cb6ef42d21e5509fd10de4015badb370e0adc45c53 \
          /bin/sh -c 'source /maas-build-actions/venv/bin/activate && $RC_PYTHON $RC_HELPER_SCRIPT'
