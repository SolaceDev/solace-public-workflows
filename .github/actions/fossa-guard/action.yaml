name: Fossa Guard
description: Run Fossa Guard scripts packaged in the maas-build-actions Docker container.
inputs:
  fossa_api_key:
    description: "FOSSA API key"
    required: true
  fossa_project_id:
    description: "FOSSA project ID"
    required: true
  fossa_category:
    description: "Issue category, licensing or vulnerability"
    required: true
  fossa_mode:
    description: "Comma-separated list of actions: BLOCK, REPORT, or both (e.g. BLOCK,REPORT)"
    required: false
  block_on:
    description: "Comma-separated list of issue types to block on. For licensing: policy_conflict,policy_flag. For vulnerability: critical,high,medium,low."
    required: false
  fossa_branch:
    description: "Specify a branch name to query issues for that branch (e.g., 'main', 'develop', 'feature/xyz')"
    required: false
  fossa_revision:
    description: "Specify a commit SHA to filter issues for a specific revision"
    required: false
  fossa_revision_scan_id:
    description: "Specify a revision scan ID for more granular filtering (advanced usage)"
    required: false
  fossa_release:
    description: "Specify a release group ID to filter issues for a release group (advanced usage)"
    required: false
  fossa_release_scan_id:
    description: "Specify a release scan ID for release group filtering (advanced usage)"
    required: false
  slack_token:
    description: "Slack bot token for posting messages (optional)"
    required: false
  slack_channel:
    description: "Slack channel ID to post to (optional)"
    required: false
  slack_thread_ts:
    description: "Slack thread timestamp to reply to an existing thread (optional)"
    required: false
  github_repository:
    description: "GitHub repository name for links (optional)"
    required: false
  github_run_id:
    description: "GitHub Actions run ID for build links (optional)"
    required: false
  github_server_url:
    description: "GitHub server URL (default: https://github.com) (optional)"
    required: false
  github_token:
    description: "GitHub token for PR comments and status checks"
    required: false
    default: ${{ github.token }}
  enable_pr_comment:
    description: "Enable PR commenting (true/false)"
    required: false
    default: "false"
  enable_status_check:
    description: "Enable GitHub status checks (true/false)"
    required: false
    default: "false"
  status_check_name:
    description: "Custom name for GitHub status check"
    required: false
    default: "FOSSA Guard"
  pr_comment_max_violations:
    description: "Maximum violations to show in PR comment"
    required: false
    default: "5"
  enable_diff_mode:
    description: "Enable diff mode to show only new issues (true/false)"
    required: false
    default: "false"
  diff_base_revision_sha:
    description: "Base revision SHA to compare against (optional - auto-detects default branch)"
    required: false
  enable_license_enrichment:
    description: "Show declared/discovered license indicators (true/false)"
    required: false
    default: "true"
  enable_privacy_mode:
    description: "Hide detailed violation information in GitHub step summary (true/false)"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Run Fossa Guard
      shell: bash
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

        # Map INPUT_* vars to the names the container scripts expect, then pass
        # each to docker via -e KEY (by reference from the current process env).
        # This is the safer approach: secrets are never written to disk and never
        # appear as command-line argument values visible in the process list.
        export FOSSA_API_KEY="${INPUT_FOSSA_API_KEY}"
        export FOSSA_PROJECT_ID="${INPUT_FOSSA_PROJECT_ID}"
        export FOSSA_CATEGORY="${INPUT_FOSSA_CATEGORY}"
        [ -n "${INPUT_FOSSA_MODE}" ]              && export FOSSA_MODE="${INPUT_FOSSA_MODE}"
        [ -n "${INPUT_BLOCK_ON}" ]                && export BLOCK_ON="${INPUT_BLOCK_ON}"
        [ -n "${INPUT_FOSSA_BRANCH}" ]            && export FOSSA_BRANCH="${INPUT_FOSSA_BRANCH}"
        [ -n "${INPUT_FOSSA_REVISION}" ]          && export FOSSA_REVISION="${INPUT_FOSSA_REVISION}"
        [ -n "${INPUT_FOSSA_REVISION_SCAN_ID}" ]  && export FOSSA_REVISION_SCAN_ID="${INPUT_FOSSA_REVISION_SCAN_ID}"
        [ -n "${INPUT_FOSSA_RELEASE}" ]           && export FOSSA_RELEASE="${INPUT_FOSSA_RELEASE}"
        [ -n "${INPUT_FOSSA_RELEASE_SCAN_ID}" ]   && export FOSSA_RELEASE_SCAN_ID="${INPUT_FOSSA_RELEASE_SCAN_ID}"
        [ -n "${INPUT_SLACK_TOKEN}" ]             && export SLACK_TOKEN="${INPUT_SLACK_TOKEN}"
        [ -n "${INPUT_SLACK_CHANNEL}" ]           && export SLACK_CHANNEL="${INPUT_SLACK_CHANNEL}"
        [ -n "${INPUT_SLACK_THREAD_TS}" ]         && export SLACK_THREAD_TS="${INPUT_SLACK_THREAD_TS}"
        [ -n "${INPUT_GITHUB_REPOSITORY}" ]       && export GITHUB_REPOSITORY="${INPUT_GITHUB_REPOSITORY}"
        [ -n "${INPUT_GITHUB_RUN_ID}" ]           && export GITHUB_RUN_ID="${INPUT_GITHUB_RUN_ID}"
        [ -n "${INPUT_GITHUB_SERVER_URL}" ]       && export GITHUB_SERVER_URL="${INPUT_GITHUB_SERVER_URL}"
        [ -n "${INPUT_GITHUB_TOKEN}" ]            && export GITHUB_TOKEN="${INPUT_GITHUB_TOKEN}"
        [ -n "${INPUT_ENABLE_PR_COMMENT}" ]       && export ENABLE_PR_COMMENT="${INPUT_ENABLE_PR_COMMENT}"
        [ -n "${INPUT_ENABLE_STATUS_CHECK}" ]     && export ENABLE_STATUS_CHECK="${INPUT_ENABLE_STATUS_CHECK}"
        [ -n "${INPUT_STATUS_CHECK_NAME}" ]       && export STATUS_CHECK_NAME="${INPUT_STATUS_CHECK_NAME}"
        [ -n "${INPUT_PR_COMMENT_MAX_VIOLATIONS}" ] && export PR_COMMENT_MAX_VIOLATIONS="${INPUT_PR_COMMENT_MAX_VIOLATIONS}"
        [ -n "${INPUT_ENABLE_DIFF_MODE}" ]        && export ENABLE_DIFF_MODE="${INPUT_ENABLE_DIFF_MODE}"
        [ -n "${INPUT_DIFF_BASE_REVISION_SHA}" ]  && export DIFF_BASE_REVISION_SHA="${INPUT_DIFF_BASE_REVISION_SHA}"
        [ -n "${INPUT_ENABLE_LICENSE_ENRICHMENT}" ] && export ENABLE_LICENSE_ENRICHMENT="${INPUT_ENABLE_LICENSE_ENRICHMENT}"
        [ -n "${INPUT_ENABLE_PRIVACY_MODE}" ]     && export ENABLE_PRIVACY_MODE="${INPUT_ENABLE_PRIVACY_MODE}"

        docker run --rm \
          -e FOSSA_API_KEY \
          -e FOSSA_PROJECT_ID \
          -e FOSSA_CATEGORY \
          -e FOSSA_MODE \
          -e BLOCK_ON \
          -e FOSSA_BRANCH \
          -e FOSSA_REVISION \
          -e FOSSA_REVISION_SCAN_ID \
          -e FOSSA_RELEASE \
          -e FOSSA_RELEASE_SCAN_ID \
          -e SLACK_TOKEN \
          -e SLACK_CHANNEL \
          -e SLACK_THREAD_TS \
          -e GITHUB_REPOSITORY \
          -e GITHUB_RUN_ID \
          -e GITHUB_SERVER_URL \
          -e GITHUB_TOKEN \
          -e ENABLE_PR_COMMENT \
          -e ENABLE_STATUS_CHECK \
          -e STATUS_CHECK_NAME \
          -e PR_COMMENT_MAX_VIOLATIONS \
          -e ENABLE_DIFF_MODE \
          -e DIFF_BASE_REVISION_SHA \
          -e ENABLE_LICENSE_ENRICHMENT \
          -e ENABLE_PRIVACY_MODE \
          -e GITHUB_REF \
          -e GITHUB_SHA \
          -e GITHUB_HEAD_REF \
          -e GITHUB_BASE_REF \
          -e GITHUB_EVENT_NAME \
          -e GITHUB_EVENT_PATH \
          -e GITHUB_OUTPUT \
          -e GITHUB_STEP_SUMMARY \
          -v "${GITHUB_WORKSPACE}:/github/workspace" \
          -v "${RUNNER_TEMP}:${RUNNER_TEMP}" \
          --workdir /github/workspace \
          "ghcr.io/${OWNER}/maas-build-actions:latest" \
          /bin/sh -c 'source /maas-build-actions/venv/bin/activate && python3 /maas-build-actions/scripts/fossa-guard/fossa_guard.py'
