name: Generate FOSSA Report
description: Generate FOSSA attribution reports using the maas-build-actions Docker container.
inputs:
  fossa_api_key:
    description: "FOSSA API Key"
    required: true
  org_id:
    description: "The organization ID for FOSSA (e.g., custom+48578). Defaults to custom+48578 if not provided."
    required: false
    default: "custom+48578"
  project_locator:
    description: "The project locator for the FOSSA project (e.g., SolaceDev_solace-dotnet-serdes). This will be combined with org-id. Not used when release_group_id is provided."
    required: false
  fossa_config_file:
    description: "Path to FOSSA config file to read project locator from (default: .fossa.yml). Used only if project_locator is not provided."
    required: false
    default: ".fossa.yml"
  revision_id:
    description: "The revision for the FOSSA project (e.g., latest, or a specific commit hash). Not used when release_group_id is provided."
    required: false
  release_group_id:
    description: "FOSSA release group ID. When provided, generates a release group attribution report instead of a per-project report."
    required: false
  release_id:
    description: "FOSSA release ID within the release group. Required when release_group_id is provided."
    required: false
  format:
    description: "The format of the report to generate ('txt' or 'csv')."
    required: true
    default: "txt"
  output_file:
    description: "The output file path for the generated report."
    required: true
    default: "fossa-report.txt"
  report_profile:
    description: "Preset report profile: 'full' (default, comprehensive), 'standard' (common fields), or 'minimal' (basic info only)."
    required: false
    default: "standard"
  report_parameters:
    description: "A JSON object of FOSSA report parameters for advanced customization. Overrides report-profile if provided."
    required: false

runs:
  using: composite
  steps:
    - name: Generate FOSSA Report
      shell: bash
      env:
        # Inject all user-controlled inputs as OS environment variables so the
        # bash script never sees their values substituted inline as script text.
        # This prevents shell injection even if an input contains metacharacters.
        FOSSA_API_KEY: ${{ inputs.fossa_api_key }}
        ORG_ID: ${{ inputs.org_id }}
        FOSSA_CONFIG_FILE: ${{ inputs.fossa_config_file }}
        FORMAT: ${{ inputs.format }}
        OUTPUT_FILE: ${{ inputs.output_file }}
        REPORT_PROFILE: ${{ inputs.report_profile }}
        PROJECT_LOCATOR: ${{ inputs.project_locator }}
        REVISION_ID: ${{ inputs.revision_id }}
        RELEASE_GROUP_ID: ${{ inputs.release_group_id }}
        RELEASE_ID: ${{ inputs.release_id }}
        REPORT_PARAMETERS: ${{ inputs.report_parameters }}
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

        # Authenticate to GHCR using the calling workflow's token so internal
        # org packages can be pulled. runs.using: docker did this automatically;
        # with composite + docker run we handle it explicitly.
        # Use an isolated DOCKER_CONFIG to avoid persisting credentials on
        # self-hosted runners' shared ~/.docker/config.json.
        DOCKER_CONFIG=$(mktemp -d "${RUNNER_TEMP}/docker-config.XXXXXX")
        export DOCKER_CONFIG
        trap 'docker logout ghcr.io > /dev/null 2>&1 || true; rm -rf "${DOCKER_CONFIG}"' EXIT
        echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

        # All inputs are already in the environment via the env: block above.

        # GITHUB_OUTPUT and GITHUB_STEP_SUMMARY live under _runner_file_commands/,
        # not under RUNNER_TEMP — mount their parent dir so the container can write outputs.
        GITHUB_OUTPUT_DIR=$(dirname "$GITHUB_OUTPUT")

        docker run --rm \
          -e FOSSA_API_KEY \
          -e ORG_ID \
          -e FOSSA_CONFIG_FILE \
          -e FORMAT \
          -e OUTPUT_FILE \
          -e REPORT_PROFILE \
          -e PROJECT_LOCATOR \
          -e REVISION_ID \
          -e RELEASE_GROUP_ID \
          -e RELEASE_ID \
          -e REPORT_PARAMETERS \
          -e GITHUB_OUTPUT \
          -e GITHUB_STEP_SUMMARY \
          -v "${GITHUB_WORKSPACE}:/github/workspace" \
          -v "${RUNNER_TEMP}:${RUNNER_TEMP}" \
          -v "${GITHUB_OUTPUT_DIR}:${GITHUB_OUTPUT_DIR}" \
          --workdir /github/workspace \
          "ghcr.io/${OWNER}/maas-build-actions@sha256:96f6a7276d96f888a1848db1d57715316054d0907471bd227a8eb737559fda3c" \
          /bin/sh -c 'bash /maas-build-actions/actions/generate-fossa-report/generate-report.sh'
