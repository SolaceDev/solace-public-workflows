name: "Fossa Scan"
description: "Runs a Fossa scan using FOSSA_API_KEY and SCA_FOSSA_* env vars."

inputs:
  guardian_url:
    description: "Guardian API base URL. Leave empty to skip upload."
    required: false
    default: ""
  guardian_token:
    description: "Bearer token for Guardian API authentication."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Fossa - Preparation step
      shell: bash
      run: |
        echo "::group::⚙️ Fossa Preparation"

        # Check if FOSSA CLI is already installed
        if command -v fossa &> /dev/null; then
          FOSSA_VERSION=$(fossa --version 2>&1 | head -n1 || echo "unknown")
          echo "✓ FOSSA CLI already installed: $FOSSA_VERSION"
        else
          echo "Installing FOSSA CLI..."
          curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh | bash
        fi

        # Use the parameter parser script for analyze command
        export FOSSA_PARAMS_CONFIG="${GITHUB_ACTION_PATH}/fossa-params.json"
        source "${GITHUB_ACTION_PATH}/parse-fossa-params.sh"

        # Build analyze args
        build_fossa_args "analyze"
        echo "SCA_FOSSA_ADDITIONAL_ARGS=${FOSSA_CLI_ARGS}" >> "$GITHUB_ENV"

        # Build test args
        build_fossa_args "test"
        echo "SCA_FOSSA_TEST_ARGS=${FOSSA_CLI_ARGS}" >> "$GITHUB_ENV"

        echo "::endgroup::"

    - name: Fossa - Scan
      shell: bash
      working-directory: ${{ env.SCA_FOSSA_PATH || '.' }}
      run: |
        echo "::group::🔍 Fossa Scan"
        if [ -n "${{ env.SCA_FOSSA_PATH }}" ]; then
          echo "Scanning from directory: ${{ env.SCA_FOSSA_PATH }}"
        fi

        FOSSA_CMD="fossa analyze"

        echo "Running: $FOSSA_CMD $SCA_FOSSA_ADDITIONAL_ARGS"
        $FOSSA_CMD $SCA_FOSSA_ADDITIONAL_ARGS
        echo "::endgroup::"

    - name: Fossa - Upload to Guardian
      if: ${{ inputs.guardian_url != '' && github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch }}
      continue-on-error: true
      shell: bash
      env:
        GUARDIAN_URL: ${{ inputs.guardian_url }}
        GUARDIAN_TOKEN: ${{ inputs.guardian_token }}
      run: |
        echo "::group::📤 Uploading FOSSA scan results to Guardian"

        SCAN_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        # product_name resolution hierarchy:
        # 1. SCA_FOSSA_PROJECT (set by sca-scan-and-guard) - strip org prefix
        # 2. project.name from .fossa.yml (SCA_FOSSA_CONFIG_FILE or default location)
        # 3. GitHub repo name (strip org from GITHUB_REPOSITORY)
        PRODUCT_NAME=""

        if [ -n "$SCA_FOSSA_PROJECT" ]; then
          PRODUCT_NAME="${SCA_FOSSA_PROJECT#${GITHUB_REPOSITORY_OWNER}_}"
        fi

        if [ -z "$PRODUCT_NAME" ]; then
          FOSSA_CONFIG="${SCA_FOSSA_CONFIG_FILE:-${SCA_FOSSA_PATH:-.}/.fossa.yml}"
          if [ -f "$FOSSA_CONFIG" ] && command -v yq &>/dev/null; then
            PRODUCT_NAME=$(yq '.project.name' "$FOSSA_CONFIG" 2>/dev/null)
            [ "$PRODUCT_NAME" = "null" ] && PRODUCT_NAME=""
          fi
        fi

        if [ -z "$PRODUCT_NAME" ]; then
          PRODUCT_NAME="${GITHUB_REPOSITORY##*/}"
        fi

        # product_version: prefer explicit FOSSA branch, fall back to GitHub ref name
        PRODUCT_VERSION="${SCA_FOSSA_BRANCH:-${GITHUB_REF_NAME:-}}"

        # product_full_version: prefer explicit FOSSA revision, fall back to commit SHA
        PRODUCT_FULL_VERSION="${SCA_FOSSA_REVISION:-${GITHUB_SHA:-}}"

        # fossa field: JSON object with revision value
        FOSSA_REVISION="${SCA_FOSSA_REVISION:-${GITHUB_SHA:-}}"
        FOSSA_JSON=$(jq -n --arg rev "$FOSSA_REVISION" '{revision: $rev}')

        echo "Uploading: product=${PRODUCT_NAME}, version=${PRODUCT_VERSION}, full_version=${PRODUCT_FULL_VERSION}"

        MAX_RETRIES=3
        RETRY_DELAY=5
        ATTEMPT=0
        UPLOAD_SUCCESS=false

        while [ $ATTEMPT -lt $MAX_RETRIES ]; do
          ATTEMPT=$((ATTEMPT + 1))
          echo "Upload attempt ${ATTEMPT}/${MAX_RETRIES}..."

          if curl --fail-with-body --request POST \
            --url "${GUARDIAN_URL}/api/v1/upload_scan_results" \
            --header "authorization: Bearer ${GUARDIAN_TOKEN}" \
            --form "product_name=${PRODUCT_NAME}" \
            --form "product_version=${PRODUCT_VERSION}" \
            --form "product_full_version=${PRODUCT_FULL_VERSION}" \
            --form "scan_time=${SCAN_TIME}" \
            --form "fossa=${FOSSA_JSON}"; then
            echo "✓ Guardian upload succeeded"
            UPLOAD_SUCCESS=true
            break
          fi

          if [ $ATTEMPT -lt $MAX_RETRIES ]; then
            echo "⚠ Attempt ${ATTEMPT} failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          fi
        done

        if [ "$UPLOAD_SUCCESS" != "true" ]; then
          echo "⚠ Guardian upload failed after ${MAX_RETRIES} attempts (non-blocking)"
        fi

        echo "::endgroup::"

    - name: FOSSA - Scan Wait For Results
      if: ${{ env.SCA_FOSSA_SKIP_TEST != 'true' }}
      continue-on-error: ${{ env.SCA_FOSSA_FAIL_ON_ISSUE != 'true' }}
      shell: bash
      working-directory: ${{ env.SCA_FOSSA_PATH || '.' }}
      run: |
        echo "::group::⏳ Fossa Wait For Results"
        echo "Running: fossa test $SCA_FOSSA_TEST_ARGS"
        fossa test $SCA_FOSSA_TEST_ARGS
        echo "::endgroup::"
