name: Plugin CI Report
description: Build a unified per-plugin CI JSON payload from SonarQube, FOSSA, and unit-test artifacts.

inputs:
  plugin_name:
    description: "Plugin identifier (for example: sam-geo-information)"
    required: true
  project_path:
    description: "Plugin/project relative path"
    required: true
  repo_owner:
    description: "Repository owner used to compose FOSSA project id"
    required: true
  branch:
    description: "FOSSA branch used for scan/report lookup"
    required: true
  revision:
    description: "FOSSA revision used for scan/report lookup"
    required: true
  sha:
    description: "Commit SHA for this plugin build"
    required: true
  github_event:
    description: "GitHub event name for this build"
    required: true
  sonarqube_result:
    description: "SonarQube step outcome"
    required: true
  unit_test_result:
    description: "Normalized unit-test result (passed/failed/skipped)"
    required: true
  unit_test_outcome:
    description: "Raw unit-test step outcome"
    required: false
    default: "missing"
  unit_test_report_path:
    description: "Path to CTRF unit test report JSON (optional)"
    required: false
    default: ""
  tests_present:
    description: "Whether tests are present for this plugin"
    required: false
    default: "false"
  junit_exists:
    description: "Whether junit report exists"
    required: false
    default: "false"
  coverage_exists:
    description: "Whether coverage report exists"
    required: false
    default: "false"
  fossa_diff_mode:
    description: "Whether FOSSA was run in diff mode"
    required: false
    default: "false"
  fossa_licensing_result:
    description: "FOSSA licensing guard step outcome"
    required: true
  fossa_licensing_report_path:
    description: "Path to licensing FOSSA JSON report"
    required: false
    default: ""
  fossa_vulnerability_result:
    description: "FOSSA vulnerability guard step outcome"
    required: true
  fossa_vulnerability_report_path:
    description: "Path to vulnerability FOSSA JSON report"
    required: false
    default: ""
  output_file:
    description: "Output file path for unified plugin CI payload"
    required: false
    default: ""

outputs:
  report_file:
    description: "Generated unified plugin CI JSON report path"
    value: ${{ steps.build.outputs.report_file }}

runs:
  using: composite
  steps:
    - name: Build unified plugin CI JSON report
      id: build
      shell: bash
      env:
        PLUGIN_NAME: ${{ inputs.plugin_name }}
        PROJECT_PATH: ${{ inputs.project_path }}
        REPO_OWNER: ${{ inputs.repo_owner }}
        BRANCH: ${{ inputs.branch }}
        REVISION: ${{ inputs.revision }}
        SHA: ${{ inputs.sha }}
        GITHUB_EVENT: ${{ inputs.github_event }}
        SONARQUBE_RESULT: ${{ inputs.sonarqube_result }}
        UNIT_TEST_RESULT: ${{ inputs.unit_test_result }}
        UNIT_TEST_OUTCOME: ${{ inputs.unit_test_outcome }}
        UNIT_TEST_REPORT_PATH: ${{ inputs.unit_test_report_path }}
        TESTS_PRESENT: ${{ inputs.tests_present }}
        JUNIT_EXISTS: ${{ inputs.junit_exists }}
        COVERAGE_EXISTS: ${{ inputs.coverage_exists }}
        FOSSA_DIFF_MODE: ${{ inputs.fossa_diff_mode }}
        FOSSA_LICENSING_RESULT: ${{ inputs.fossa_licensing_result }}
        FOSSA_LICENSING_REPORT_PATH: ${{ inputs.fossa_licensing_report_path }}
        FOSSA_VULNERABILITY_RESULT: ${{ inputs.fossa_vulnerability_result }}
        FOSSA_VULNERABILITY_REPORT_PATH: ${{ inputs.fossa_vulnerability_report_path }}
        OUTPUT_FILE: ${{ inputs.output_file }}
      run: python3 "${{ github.action_path }}/scripts/build_report.py"
