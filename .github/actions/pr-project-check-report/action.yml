name: PR Project Check Report
description: Aggregate project check artifacts and publish PR-friendly markdown for SonarQube or Unit Tests.

inputs:
  check_type:
    description: "Aggregation mode: sonarqube or unit-tests"
    required: true
  projects_json:
    description: "JSON array of changed projects (e.g. [{\"project_directory\":\"service-a\"}])"
    required: false
    default: ""
  plugins_json:
    description: "Deprecated alias for projects_json"
    required: false
    default: ""
  results_dir:
    description: "Directory containing downloaded CI result artifacts"
    required: false
    default: "ci-plugin-results"
  github_token:
    description: "GitHub token used for comments/check updates"
    required: false
    default: ${{ github.token }}
  sonarqube_host_url:
    description: "SonarQube base URL (only used for check_type=sonarqube)"
    required: false
    default: "https://sonarq.solace.com"
  check_name:
    description: "Target check run name to update details for"
    required: false
    default: ""
  comment_on_pr:
    description: "Whether to create/update a PR comment"
    required: false
    default: "false"
  comment_marker:
    description: "Marker string used to find/update an existing bot comment"
    required: false
    default: ""
  pr_number:
    description: "Pull request number (optional explicit override)"
    required: false
    default: ""
  update_check_details:
    description: "Whether to update the current job check-run details"
    required: false
    default: "true"
  fail_on_issues:
    description: "Exit non-zero when any project has issues"
    required: false
    default: "true"

outputs:
  all_passed:
    description: "true when all project checks passed (or were skipped for unit tests)"
    value: ${{ steps.aggregate.outputs.all_passed }}
  project_results:
    description: "JSON list of per-project aggregation rows"
    value: ${{ steps.aggregate.outputs.project_results }}
  failing_projects:
    description: "JSON list of failing projects (unit-tests mode)"
    value: ${{ steps.aggregate.outputs.failing_projects }}
  missing_projects:
    description: "JSON list of projects missing result payloads (unit-tests mode)"
    value: ${{ steps.aggregate.outputs.missing_projects }}
  # Backward-compat aliases
  plugin_results:
    description: "Deprecated alias for project_results"
    value: ${{ steps.aggregate.outputs.project_results }}
  failing_plugins:
    description: "Deprecated alias for failing_projects"
    value: ${{ steps.aggregate.outputs.failing_projects }}
  missing_plugins:
    description: "Deprecated alias for missing_projects"
    value: ${{ steps.aggregate.outputs.missing_projects }}
  report_markdown:
    description: "Rendered markdown report"
    value: ${{ steps.aggregate.outputs.report_markdown }}

runs:
  using: composite
  steps:
    - name: Aggregate project checks
      id: aggregate
      shell: bash
      env:
        CHECK_TYPE: ${{ inputs.check_type }}
        PROJECTS_JSON: ${{ inputs.projects_json || inputs.plugins_json }}
        RESULTS_DIR: ${{ inputs.results_dir }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        SONARQUBE_HOST_URL: ${{ inputs.sonarqube_host_url }}
        CHECK_NAME: ${{ inputs.check_name }}
        COMMENT_ON_PR: ${{ inputs.comment_on_pr }}
        COMMENT_MARKER: ${{ inputs.comment_marker }}
        PR_NUMBER: ${{ inputs.pr_number }}
        UPDATE_CHECK_DETAILS: ${{ inputs.update_check_details }}
        FAIL_ON_ISSUES: ${{ inputs.fail_on_issues }}
      run: python3 "${{ github.action_path }}/scripts/aggregate.py"
